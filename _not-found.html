":\"What is an MCP server?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"An MCP (Model Context Protocol) server is just a process that exposes tools, data, and capabilities to an LLM client over a standardized protocol - kind of like a GraphQL endpoint, but for an agent. It lets a client like Claude Code read your database, call your APIs, or run domain-specific actions without bespoke integration code. I build custom MCP servers, including the open-source MERN MCP, that automate full-stack CRUD scaffolding and developer workflows.\"}},{\"@type\":\"Question\",\"name\":\"What is a Claude Code plugin?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"A Claude Code plugin extends the Claude Code CLI with custom commands, hooks, MCP servers, sub-agents, or skills tailored to your codebase. Plugins can narrate edits, enforce conventions, run pre-commit checks, or wire in proprietary tools. I've authored claude-human-review, which describes each edit Claude is about to make in plain English so engineers can approve or undo with full context - diff hunts are the wrong review surface.\"}},{\"@type\":\"Question\",\"name\":\"What is a ReAct agent?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"A ReAct (Reasoning + Acting) agent is an LLM that interleaves thoughts with concrete tool calls - read a file, run a search, write a patch - until a task is complete. It's the loop behind most modern coding agents. My open-source project nip is a local-first ReAct agent powered by Gemma on Ollama, with no cloud calls and no vendor lock-in.\"}},{\"@type\":\"Question\",\"name\":\"Is Irteza Asad Rizvi available for hire?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"Yes. I'm open to senior full-stack roles, AI-focused contracts, and consulting engagements. Remote out of Toronto, specializing in shipping production AI features - LLM agents, Claude Code plugins, MCP servers - into Next.js, Node.js, Vue, and Nuxt apps. Fastest way to reach me: irtezaasad@gmail.com.\"}},{\"@type\":\"Question\",\"name\":\"What stack does Irteza work in?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"Primary: TypeScript, Node.js, Next.js, React, Vue, Nuxt, Python, MongoDB, PostgreSQL, Docker, AWS, Linux. AI-specific: Claude SDK, Model Context Protocol, Ollama, ONNX Runtime. CI/CD: Jenkins and Docker. Seven-plus years of production web work and active AI tooling on top.\"}}]}"])</script><script>self.__next_f.push([1,"4:[\"$\",\"script\",null,{\"type\":\"application/ld+json\",\"dangerouslySetInnerHTML\":{\"__html\":\"$c\"}}]\n"])</script><script>self.__next_f.push([1,"5:[\"$\",\"body\",null,{\"className\":\"font-sans\",\"children\":[\"$\",\"$Ld\",null,{\"parallelRouterKey\":\"children\",\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$Le\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":[[[\"$\",\"title\",null,{\"children\":\"404: This page could not be found.\"}],[\"$\",\"div\",null,{\"style\":{\"fontFamily\":\"system-ui,\\\"Segoe UI\\\",Roboto,Helvetica,Arial,sans-serif,\\\"Apple Color Emoji\\\",\\\"Segoe UI Emoji\\\"\",\"height\":\"100vh\",\"textAlign\":\"center\",\"display\":\"flex\",\"flexDirection\":\"column\",\"alignItems\":\"center\",\"justifyContent\":\"center\"},\"children\":[\"$\",\"div\",null,{\"children\":[[\"$\",\"style\",null,{\"dangerouslySetInnerHTML\":{\"__html\":\"body{color:#000;background:#fff;margin:0}.next-error-h1{border-right:1px solid rgba(0,0,0,.3)}@media (prefers-color-scheme:dark){body{color:#fff;background:#000}.next-error-h1{border-right:1px solid rgba(255,255,255,.3)}}\"}}],[\"$\",\"h1\",null,{\"className\":\"next-error-h1\",\"style\":{\"display\":\"inline-block\",\"margin\":\"0 20px 0 0\",\"padding\":\"0 23px 0 0\",\"fontSize\":24,\"fontWeight\":500,\"verticalAlign\":\"top\",\"lineHeight\":\"49px\"},\"children\":404}],[\"$\",\"div\",null,{\"style\":{\"display\":\"inline-block\"},\"children\":[\"$\",\"h2\",
